# BitBot — frontend, backend, Postgres, Elasticsearch, ModernBERT (BentoML)
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecom_support}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  modernbert:
    build: ./services/modernbert_bento
    environment:
      MODERNBERT_MODEL_DIR: ${MODERNBERT_MODEL_DIR:-/training/models/bitext_multiclass_finetuned_20260415T120000Z/winner}
    ports:
      - "3000:3000"
    volumes:
      - ./training/models:/training/models:ro
      - ${MODERNBERT_MODEL_SOURCE:-./training/models/bitext_multiclass_finetuned_20260415T120000Z/winner}:${MODERNBERT_MODEL_DIR:-/training/models/bitext_multiclass_finetuned_20260415T120000Z/winner}:ro

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      CLASSIFIER_BENTOML_URL: http://modernbert:3000/classify
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ecom_support}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      NO_ISSUE_MODEL_PROVIDER: ${NO_ISSUE_MODEL_PROVIDER:-ollama}
      NO_ISSUE_MODEL: ${NO_ISSUE_MODEL:-llama3.2}
      INTENT_MODEL_PROVIDER: ${INTENT_MODEL_PROVIDER:-ollama}
      INTENT_MODEL: ${INTENT_MODEL:-llama3.2}
      VALIDATION_MODEL_PROVIDER: ${VALIDATION_MODEL_PROVIDER:-ollama}
      VALIDATION_MODEL: ${VALIDATION_MODEL:-llama3.2}
      ES_HOST: ${ES_HOST:-elasticsearch}
      ES_PORT: ${ES_PORT:-9200}
      ES_SCHEME: ${ES_SCHEME:-http}
      ES_POLICY_INDEX: ${ES_POLICY_INDEX:-policy_docs}
      ES_TIMEOUT_SECONDS: ${ES_TIMEOUT_SECONDS:-5}
    depends_on:
      - postgres
      - elasticsearch
      - modernbert
    volumes:
      - ./backend:/app/backend

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  esdata:
