# BitBot — frontend, backend, Postgres, Elasticsearch, ModernBERT (BentoML)
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecom_support}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-ecom_support}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  modernbert:
    build: ./services/modernbert_bento
    environment:
      MODERNBERT_MODEL_DIR: ${MODERNBERT_MODEL_DIR}
    ports:
      - "3000:3000"
    volumes:
      - ${MODERNBERT_MODELS_HOST_DIR:-./training/models}:${MODERNBERT_MODELS_CONTAINER_DIR:-/training/models}:ro

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      CLASSIFIER_BENTOML_URL: http://modernbert:3000/classify
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ecom_support}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      NO_ISSUE_MODEL_PROVIDER: ${NO_ISSUE_MODEL_PROVIDER:-ollama}
      NO_ISSUE_MODEL: ${NO_ISSUE_MODEL:-llama3.2}
      INTENT_MODEL_PROVIDER: ${INTENT_MODEL_PROVIDER:-ollama}
      INTENT_MODEL: ${INTENT_MODEL:-llama3.2}
      VALIDATION_MODEL_PROVIDER: ${VALIDATION_MODEL_PROVIDER:-ollama}
      VALIDATION_MODEL: ${VALIDATION_MODEL:-llama3.2}
      ES_HOST: ${ES_HOST:-elasticsearch}
      ES_PORT: ${ES_PORT:-9200}
      ES_SCHEME: ${ES_SCHEME:-http}
      ES_POLICY_INDEX: ${ES_POLICY_INDEX:-policy_docs}
      ES_TIMEOUT_SECONDS: ${ES_TIMEOUT_SECONDS:-5}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      modernbert:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; resp=urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3); sys.exit(0 if resp.getcode()==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    volumes:
      - ./backend:/app/backend

  simulator:
    build: ./backend
    working_dir: /app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_HOST_SIMULATOR: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ecom_support}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SIMULATOR_AGENT_URL: ${SIMULATOR_AGENT_URL:-http://backend:8000/classify}
      SIMULATOR_LLM_PROVIDER: ${SIMULATOR_LLM_PROVIDER:-ollama}
      SIMULATOR_LLM_MODEL: ${SIMULATOR_LLM_MODEL:-llama3.2}
      SIMULATOR_LLM_TIMEOUT_SECONDS: ${SIMULATOR_LLM_TIMEOUT_SECONDS:-120}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      CEREBRAS_API_BASE: ${CEREBRAS_API_BASE:-https://api.cerebras.ai/v1}
      CEREBRAS_TEMPERATURE: ${CEREBRAS_TEMPERATURE:-0.2}
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
    command: >
      sh -lc "echo 'Simulator service is idle. Trigger runs manually with docker compose exec simulator python -m testing.simulator.runner ...' && sleep infinity"

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  esdata:
