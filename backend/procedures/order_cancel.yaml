id: order_cancel
category: order
intent: cancel_order
keywords:
  - cancel
  - do not want
  - dont want
required_data:
  - name: order_id
    prompt: Please provide your order number (e.g. ORD-12345).
# Order ID is validated before steps run — if missing, the user is asked for their order ID; if present, continue below.
steps:
  - id: lookup_order
    type: tool_call
    tool: check_order_status
  - id: branch_order_found
    type: logic_gate
    condition: {op: eq, field: order_found, value: true}
    on_true: retrieve_cancel_policy
    on_false: order_not_found
  - id: order_not_found
    type: llm_response
    message: >
      The order was not found (order_found is false). Tell the customer we could not find this
      order in our system, and ask them to validate their order ID and try again.
  - id: retrieve_cancel_policy
    type: retrieval
    tool: order_policy_search
  - id: branch_cancel_policy_found
    type: logic_gate
    condition: {op: eq, field: policy_found, value: true}
    on_true: apply_policy_and_cancel_or_decline
    on_false: escalate_no_cancel_policy
  - id: escalate_no_cancel_policy
    type: interrupt
    action_type: cancel_escalation
    message: >
      No cancellation policy could be retrieved for this request. Escalate to a human agent so
      they can confirm cancellation rules and assist the customer.
    on_accept_message: >
      Thanks for confirming. I have escalated this cancellation case to a human support agent.
    on_reject_message: >
      Understood. I will not escalate this cancellation case right now.
  - id: apply_policy_and_cancel_or_decline
    type: tool_call
    tool: cancel_order
  - id: branch_cancel_succeeded
    type: logic_gate
    condition: {op: eq, field: cancel_succeeded, value: true}
    on_true: confirm_cancelled
    on_false: cancellation_not_allowed
  - id: confirm_cancelled
    type: llm_response
    message: >
      The cancellation was executed by the backend tool (cancel_succeeded is true). Confirm to
      the customer that order_id_extracted has been cancelled and share what they should expect
      next.
  - id: cancellation_not_allowed
    type: llm_response
    message: >
      The cancellation could not be executed (cancel_succeeded is false). Explain clearly why
      using cancel_reason from procedure context and guide the customer on next steps.
fallback_response: I can help with cancellation once you share your order number so I can verify it.
