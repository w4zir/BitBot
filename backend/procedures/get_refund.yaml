id: get_refund
category: refund
intent: get_refund
keywords:
  - refund
  - damaged
  - wrong item
  - defective
  - not what i ordered
  - money back
required_data:
  - name: order_id
    prompt: Please provide your order number (for example ORD-12345) so we can review your refund.
# Order ID is collected via required-data validation before steps run — if missing, the user is asked; if present, continue below.
steps:
  - id: lookup_order
    type: tool_call
    tool: check_order_status
  - id: branch_order_found
    type: logic_gate
    condition: "order_found == True"
    on_true: retrieve_refund_policy
    on_false: order_not_found
  - id: order_not_found
    type: llm_response
    message: >
      The order was not found (order_found is false). Tell the customer we could not find this
      order in our system, and ask them to validate their order ID and try again.
  - id: retrieve_refund_policy
    type: retrieval
    tool: order_policy_search
  - id: branch_refund_policy_found
    type: logic_gate
    condition: "policy_found == True"
    on_true: assess_eligibility_and_refund
    on_false: escalate_no_refund_policy
  - id: escalate_no_refund_policy
    type: interrupt
    message: >
      No refund policy could be retrieved for this request. Escalate to a human agent so they
      can confirm refund rules and assist the customer.
  - id: assess_eligibility_and_refund
    type: llm_response
    message: >
      Refund policy text and rules are in retrieved_docs (policy_found is true). The order was
      found (order_found is true); use order_id_extracted and order_status from procedure context.
      First, determine whether the customer is eligible for a refund under those policy rules.
      If they are not eligible, explain clearly why, with specific reasons tied to the policy—do
      not proceed with a refund. If they are eligible, determine the refund amount; compare it to
      any refund approval threshold stated in the policy. If the refund amount is above that
      threshold, explain that the case requires human validation and escalation before a refund
      can be issued. If the amount is at or below the threshold, confirm that a refund will be
      generated (or has been submitted) and what the customer should expect next.
fallback_response: I can help with a refund once you share your order number so we can look it up.
