id: get_refund
category: refund
intent: get_refund
keywords:
  - refund
  - damaged
  - wrong item
  - defective
  - not what i ordered
  - money back
required_data:
  - name: order_id
    prompt: Please provide your order number (for example ORD-12345) so we can review your refund.
# Order ID is collected via required-data validation before steps run — if missing, the user is asked; if present, continue below.
steps:
  - id: lookup_order
    type: tool_call
    tool: check_order_status
  - id: lookup_refund_context
    type: tool_call
    tool: refund_context_lookup
  - id: branch_order_found
    type: logic_gate
    condition: {op: eq, field: order_found, value: true}
    on_true: retrieve_refund_policy
    on_false: order_not_found
  - id: order_not_found
    type: llm_response
    message: >
      The order was not found (order_found is false). Tell the customer we could not find this
      order in our system, and ask them to validate their order ID and try again.
  - id: retrieve_refund_policy
    type: retrieval
    tool: order_policy_search
  - id: branch_refund_policy_found
    type: logic_gate
    condition: {op: eq, field: policy_found, value: true}
    on_true: assess_eligibility_and_refund
    on_false: escalate_no_refund_policy
  - id: escalate_no_refund_policy
    type: interrupt
    action_type: refund_escalation
    message: >
      No refund policy could be retrieved for this request. Escalate to a human agent so they
      can confirm refund rules and assist the customer.
    on_accept_message: >
      Thanks for confirming. I have escalated your refund request to a human support agent.
    on_reject_message: >
      Understood. I will not escalate this refund request right now.
  - id: assess_eligibility_and_refund
    type: tool_call
    tool: create_refund_request
  - id: branch_refund_created
    type: logic_gate
    condition: {op: eq, field: refund_request_created, value: true}
    on_true: confirm_refund_submitted
    on_false: refund_not_created
  - id: confirm_refund_submitted
    type: llm_response
    message: >
      A refund request was created by the backend tool (refund_request_created is true). Confirm
      the submission to the customer using refund_request_id and refund_decision from procedure
      context and explain next expected steps.
  - id: refund_not_created
    type: llm_response
    message: >
      The refund request could not be created (refund_request_created is false). Explain clearly
      why using refund_request_reason from procedure context and advise the customer on next steps.
fallback_response: I can help with a refund once you share your order number so we can look it up.
