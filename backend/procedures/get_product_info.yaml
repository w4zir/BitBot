id: get_product_info
category: product
intent: get_product_info
keywords:
  - price
  - in stock
  - availability
  - product info
  - how much
  - do you have
required_data:
  - name: product_name
    prompt: What is the name of the product?
steps:
  - id: draft_response
    type: llm_response
    message: >-
      Search the product catalog using the provided product name with flexible name matching; spelling and exact wording may differ. If a match is found, share the product information including price and availability as binary yes/no. If no match is found, state that the product is not in catalog.
fallback_response: Tell me which product you mean and I will share price and whether it is available.
