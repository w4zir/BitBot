id: get_product_info
category: product
intent: get_product_info
keywords:
  - price
  - in stock
  - availability
  - product info
  - how much
  - do you have
required_data:
  - name: product_name
    prompt: What is the name of the product?
steps:
  - id: lookup_product
    type: tool_call
    tool: product_catalog_lookup
  - id: branch_product_found
    type: logic_gate
    condition: "product_found == True"
    on_true: share_product_info
    on_false: product_not_found
  - id: share_product_info
    type: llm_response
    message: >-
      The product was found in catalog. Use product.name, product.price, and product.is_available from procedure context.
      Reply with concise product details and availability as yes/no.
  - id: product_not_found
    type: llm_response
    message: >-
      The product is not in catalog (product_found is false). Tell the customer the product was not found and ask them to confirm the product name.
fallback_response: Tell me which product you mean and I will share price and whether it is available.
