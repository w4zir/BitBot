seeds:
  - seed_id: payment_issue_basic
    category: payment
    intent: payment_issue
    difficulty: medium
    persona_id: polite_first_timer
    description: "Customer reports a payment issue for a transaction."
    expected_outcome: resolved
    expected_procedure_id: payment_issue
    db_filter:
      entity_type: order
      order_status: [processing, shipped, delivered]
    multi_issue: false

  - seed_id: payment_methods_lookup
    category: payment
    intent: check_payment_methods
    difficulty: easy
    persona_id: polite_first_timer
